services:
  backend:
    build: .
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 600s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.tradingbackend.rule=Host(`api.straddly.pro`)"
      - "traefik.http.routers.tradingbackend.service=tradingbackend"
      - "traefik.http.routers.tradingbackend.entrypoints=http,https"
      - "traefik.http.routers.tradingbackend.tls=true"
      - "traefik.http.routers.tradingbackend.tls.certresolver=letsencrypt"
      - "traefik.http.services.tradingbackend.loadbalancer.server.port=8000"
    environment:
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@db:5432/trading_terminal
      - LOG_LEVEL=WARNING
      - ENVIRONMENT=production
      - CORS_ORIGINS_RAW=${CORS_ORIGINS_RAW:-https://app.straddly.pro,https://straddly.pro,https://www.straddly.pro,https://learn.straddly.pro,http://localhost:3000,http://localhost:5173}
      - DEBUG=false
      - STARTUP_LOAD_MASTER=true
      - STARTUP_LOAD_TIER_B=true
      - STARTUP_START_STREAMS=true
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./logs:/app/logs
    restart: always

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=trading_terminal
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis_data:/data
    restart: always
    command: redis-server --appendonly yes

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Default to same-origin /api/v2 so we reuse the main domain's TLS cert
        VITE_API_URL: ${VITE_API_URL:-/api/v2}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.tradingfrontend.rule=Host(`straddly.pro`) || Host(`www.straddly.pro`) || Host(`learn.straddly.pro`)"
      - "traefik.http.routers.tradingfrontend.entrypoints=http,https"
      - "traefik.http.routers.tradingfrontend.tls=true"
      - "traefik.http.routers.tradingfrontend.tls.certresolver=letsencrypt"
      - "traefik.http.services.tradingfrontend.loadbalancer.server.port=80"
    environment:
      - VITE_API_URL=${VITE_API_URL:-/api/v2}
    depends_on:
      backend:
        condition: service_started
    restart: always

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    name: coolify
    external: true

